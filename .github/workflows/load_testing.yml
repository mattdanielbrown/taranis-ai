name: Release gate tests

on:
  workflow_dispatch:
    inputs:
      tests:
        description: "Release gate to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - postgres-tls
          - load
      users:
        description: "Optional Locust user override"
        required: false
        default: ""
        type: string
      spawn_rate:
        description: "Optional Locust spawn rate override"
        required: false
        default: ""
        type: string
      run_time:
        description: "Optional Locust run time override"
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  release_gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run release gate tests
        env:
          DOCKER_IMAGE_NAMESPACE: ghcr.io/taranis-ai
          TARANIS_TAG: latest
          LOAD_RUN_ID: ${{ github.run_id }}
          LOAD_ARTIFACT_DIR: ${{ github.workspace }}/release-gate-artifacts/load-${{ github.run_id }}
          LOCUST_USERS: ${{ inputs.users }}
          LOCUST_SPAWN_RATE: ${{ inputs.spawn_rate }}
          LOCUST_RUN_TIME: ${{ inputs.run_time }}
        run: |
          ./docker/run_release_gate_tests.sh "${{ inputs.tests }}"

      - name: Upload release gate artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-gate-artifacts-${{ github.run_id }}
          path: release-gate-artifacts
          if-no-files-found: warn
