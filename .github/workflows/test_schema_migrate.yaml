name: Test schema migration

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: read

jobs:
  schema_change:
    name: detect schema changes
    if: github.event.review.state == 'approved'
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.changes.outputs.changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - id: changes
        run: |
          if git diff --quiet \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}" -- \
            src/core/core/model \
            src/core/migrations \
            src/models; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  migration_upgrade:
    name: migrate released database to approved PR
    needs: schema_change
    if: needs.schema_change.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          prune-cache: false

      - name: Migrate the latest released database
        env:
          CONTAINER_CLI: docker
        run: |
          BASE_REF="$(git describe --tags --abbrev=0 --match '[0-9]*.[0-9]*.[0-9]*')"
          BASE_REF="$BASE_REF" ./dev/test_master_to_branch_migration.sh
