services:
  database:
    image: "docker.io/library/postgres:17-alpine"
    shm_size: 512mb
    environment:
      POSTGRES_DB: taranis
      POSTGRES_USER: taranis
      POSTGRES_PASSWORD: taranis
    command: ["postgres", "-c", "shared_buffers=64MB", "-c", "max_connections=200"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taranis -d taranis"]
      interval: 5s
      start_period: 10s
      timeout: 3s
      retries: 20

  redis:
    image: "redis:8-alpine"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 2s

  core:
    image: "${DOCKER_IMAGE_NAMESPACE:-ghcr.io/taranis-ai}/taranis-core:${TARANIS_TAG:-latest}"
    pull_policy: always
    environment:
      DB_URL: database
      DB_DATABASE: taranis
      DB_USER: taranis
      DB_PASSWORD: taranis
      TARANIS_AUTHENTICATOR: database
      APPLICATION_ROOT: /
      REDIS_URL: redis://redis:6379/0
      REDIS_PASSWORD: ""
      PRE_SEED_PASSWORD_ADMIN: admin
      PRE_SEED_PASSWORD_USER: test
      SKIP_INITIAL_USER_ONBOARDING: "${SKIP_INITIAL_USER_ONBOARDING:-False}"
      JWT_SECRET_KEY: load_testing_secret_key
      JWT_COOKIE_SUFFIX: ""
      API_KEY: load_testing_api_key
      DEBUG: "true"
      DISABLE_SSE: "true"
      TARANIS_CORE_SENTRY_DSN: ""
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/api/isalive', timeout=2)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

  frontend:
    image: "${DOCKER_IMAGE_NAMESPACE:-ghcr.io/taranis-ai}/taranis-frontend:${TARANIS_TAG:-latest}"
    pull_policy: always
    environment:
      TARANIS_CORE_URL: http://core:8080/api
      APPLICATION_ROOT: /frontend
      TARANIS_BASE_PATH: /
      JWT_SECRET_KEY: load_testing_secret_key
      JWT_COOKIE_SUFFIX: ""
      REDIS_URL: redis://redis:6379/0
      REDIS_PASSWORD: ""
      DEBUG: "true"
    depends_on:
      core:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "taranis-frontend-healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

  ingress:
    image: "${DOCKER_IMAGE_NAMESPACE:-ghcr.io/taranis-ai}/taranis-ingress:${TARANIS_TAG:-latest}"
    pull_policy: always
    environment:
      NGINX_WORKERS: "2"
      NGINX_CONNECTIONS: "32"
      TARANIS_CORE_UPSTREAM: core:8080
      TARANIS_FRONTEND_UPSTREAM: frontend:8080
      TARANIS_SSE_UPSTREAM: core:8080
      TARANIS_BASE_PATH: /
    depends_on:
      core:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "${LOAD_TEST_INGRESS_PORT:-18080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "/usr/bin/curl --fail http://localhost:8080/frontend/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

  seed:
    image: ghcr.io/taranis-ai/load-test:latest
    pull_policy: always
    command: ["python", "-m", "tests.load.load_support.seed"]
    environment:
      CORE_API_URL: http://core:8080/api
      API_KEY: load_testing_api_key
      SEED_STORY_COUNT: ${SEED_STORY_COUNT:-1000}
      SEED_REPORT_COUNT: ${SEED_REPORT_COUNT:-250}
    depends_on:
      core:
        condition: service_healthy

  locust:
    image: ghcr.io/taranis-ai/load-test:latest
    pull_policy: always
    working_dir: /artifacts
    command:
      [
        "locust",
        "--headless",
        "--only-summary",
        "--exit-code-on-error",
        "0",
        "--stop-timeout",
        "30",
        "--host",
        "http://ingress:8080",
        "--users",
        "${LOCUST_USERS:-1}",
        "--spawn-rate",
        "${LOCUST_SPAWN_RATE:-1}",
        "--run-time",
        "${LOCUST_RUN_TIME:-2m}",
        "--html",
        "/artifacts/locust-report.html",
        "--csv",
        "/artifacts/locust",
        "-f",
        "/opt/loadtest/tests/load/locustfile.py",
      ]
    environment:
      PWHEADLESS: "1"
      PWBROWSER: chromium
      TARGET_HOST: http://ingress:8080
      TARANIS_LOAD_FLOWS: ${TARANIS_LOAD_FLOWS:-}
      TARANIS_LOAD_USERNAME: user
      TARANIS_LOAD_PASSWORD: test
      TARANIS_EXPECTED_REPORT_TITLE: Load Test Report ${SEED_REPORT_COUNT:-250}
    volumes:
      - ${LOAD_ARTIFACT_DIR:?set LOAD_ARTIFACT_DIR}:/artifacts
    depends_on:
      ingress:
        condition: service_healthy
